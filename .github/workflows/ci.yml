name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible ansible-lint

      - name: Run ansible-lint
        run: ansible-lint

  sanity:
    name: Sanity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: ansible_collections/onepam/agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Run ansible-test sanity
        run: ansible-test sanity --docker -v --color
        working-directory: ansible_collections/onepam/agent

  metadata:
    name: Check metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate galaxy.yml
        run: |
          python3 -c "
          import yaml, sys
          with open('galaxy.yml') as f:
              data = yaml.safe_load(f)
          required = ['namespace', 'name', 'version', 'authors', 'description', 'license']
          for key in required:
              if key not in data or not data[key]:
                  print(f'Missing required field: {key}', file=sys.stderr)
                  sys.exit(1)
          print('galaxy.yml is valid.')
          "
