name: Publish to Ansible Galaxy

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Pre-publish Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible ansible-lint

      - name: Run ansible-lint
        run: ansible-lint

      - name: Run sanity tests
        run: |
          mkdir -p /tmp/collections/ansible_collections/onepam/agent
          cp -a . /tmp/collections/ansible_collections/onepam/agent/
          cd /tmp/collections/ansible_collections/onepam/agent
          ansible-test sanity --docker -v --color

  publish:
    name: Publish to Galaxy
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Validate tag matches galaxy.yml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GALAXY_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('galaxy.yml'))['version'])")
          if [ "$TAG_VERSION" != "$GALAXY_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match galaxy.yml version ($GALAXY_VERSION). Update galaxy.yml first."
            exit 1
          fi
          echo "Version $TAG_VERSION confirmed."

      - name: Build collection
        run: |
          ansible-galaxy collection build --force
          echo "Built collection:"
          ls -lh onepam-agent-*.tar.gz

      - name: Publish to Ansible Galaxy
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        run: |
          if [ -z "$GALAXY_API_KEY" ]; then
            echo "::error::GALAXY_API_KEY secret is not set."
            exit 1
          fi
          TARBALL=$(ls onepam-agent-*.tar.gz | head -1)
          echo "Publishing $TARBALL to Ansible Galaxy..."
          ansible-galaxy collection publish "$TARBALL" --api-key "$GALAXY_API_KEY"
          echo "Published to Ansible Galaxy successfully."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: onepam-agent-*.tar.gz
          body: |
            ## Install

            ```bash
            ansible-galaxy collection install onepam.agent
            ```

            Or pin to this version:

            ```bash
            ansible-galaxy collection install onepam.agent:==${{ github.ref_name }}
            ```

            - [Ansible Galaxy](https://galaxy.ansible.com/ui/repo/published/onepam/agent/)
            - [Documentation](https://onepam.com/docs/install/ansible)
